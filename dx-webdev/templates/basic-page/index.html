<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DevExtreme jQuery Basic Page</title>
    <link id="dx-theme" rel="stylesheet" href="https://cdn3.devexpress.com/jslib/25.2.3/css/dx.light.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="dx-viewport">
<!-- DX_WIDGET_REGION_START -->
    <div class="app-shell">
        <header class="app-header">
            <h1 data-page-title>DevExtreme jQuery Basic Page</h1>
            <p class="app-subtitle">Pure HTML, JavaScript, and CSS interface</p>
        </header>
        <main class="app-content">
            <section class="widget-panel">
                <div id="pageToolbar" class="widget-host"></div>
            </section>
            <section class="widget-panel">
                <div id="primaryAction" class="widget-host"></div>
            </section>
            <section class="widget-panel">
                <div id="activityList" class="widget-host"></div>
            </section>
            <div id="pageLoadPanel" class="widget-host"></div>
            <p class="state-message" data-empty-state>No activity has been recorded yet.</p>
            <p class="state-message state-message-error" data-error-state hidden>Unable to load page data.</p>
        </main>
    </div>
<!-- DX_WIDGET_REGION_END -->
    <script id="jquery-script" src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script id="dx-script" src="https://cdn3.devexpress.com/jslib/25.2.3/js/dx.all.js"></script>
    <script src="./app.js"></script>
</body>
</html>
